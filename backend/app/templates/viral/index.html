<!DOCTYPE html>
<!--
  Viral scene template — kinetic typography on dark background.
  1080×1920 (9:16). Rendered by Playwright headless Chromium.

  Props injected by html_renderer.py:
    window.__SCENE__ = { index, start, end, template, props: { headline, subhead, ... } }

  Signals ready via:
    window.__SCENE_READY__ = true   (set by scene.js after fonts + bg loaded)

  Animation contract:
    - CSS @keyframes ONLY. No setTimeout / setInterval.
    - Playwright steps currentTime forward deterministically.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Scene</title>

  <!--
    Fonts shipped with app. Playwright serves from local file server,
    so relative paths resolve correctly. Never system fonts.
  -->
  <style>
    @font-face {
      font-family: 'NotoSans';
      src: url('../../../assets/fonts/NotoSans-Bold.ttf') format('truetype');
      font-weight: 700 900;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSans';
      src: url('../../../assets/fonts/NotoSans-Regular.ttf') format('truetype');
      font-weight: 400 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSansCJK';
      src: url('../../../assets/fonts/NotoSansCJK-Bold.otf') format('opentype');
      font-weight: 700 900;
      unicode-range: U+4E00-9FFF, U+3040-309F, U+30A0-30FF, U+AC00-D7AF;
      font-display: swap;
    }
  </style>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background image layer -->
  <div id="bg"></div>

  <!-- Film grain noise -->
  <div id="noise"></div>

  <!-- Floating particles (populated by scene.js) -->
  <div id="particles"></div>

  <!-- Main content -->
  <div id="content">
    <div id="label">Breaking</div>
    <div id="headline">LOADING</div>
    <div id="divider"></div>
    <div id="subhead"></div>
  </div>

  <!-- Scene counter badge -->
  <div id="badge">01</div>

  <!-- Progress bar (spans full scene duration) -->
  <div id="progress-bar"></div>

  <!-- Inject scene props, then signal SCENE_READY -->
  <script src="scene.js"></script>

</body>
</html>
