<!DOCTYPE html>
<!--
  Viral scene template — cinematic kinetic typography on dark background.
  Fully responsive: all dimensions in vw/vh so it works at any viewport size
  (preview: 480x854, final: 1080x1920).

  Props injected by html_renderer.py:
    window.__SCENE__ = { index, start, end, template, props: { headline, subhead, ... } }

  Signals ready via:
    window.__SCENE_READY__ = true   (set by scene.js after fonts loaded)

  Animation contract:
    - CSS @keyframes ONLY. No setTimeout / setInterval.
    - Playwright steps currentTime forward deterministically.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Scene</title>

  <style>
    @font-face {
      font-family: 'NotoSans';
      src: url('../../../assets/fonts/NotoSans-Bold.ttf') format('truetype');
      font-weight: 700 900;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSans';
      src: url('../../../assets/fonts/NotoSans-Regular.ttf') format('truetype');
      font-weight: 400 600;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSansCJK';
      src: url('../../../assets/fonts/NotoSansCJK-Bold.otf') format('opentype');
      font-weight: 700 900;
      unicode-range: U+4E00-9FFF, U+3040-309F, U+30A0-30FF, U+AC00-D7AF;
      font-display: swap;
    }
  </style>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background image layer -->
  <div id="bg"></div>

  <!-- Radial gradient halo — cinematic top glow -->
  <div id="gradient-halo"></div>

  <!-- Inner glow — role-coloured radial depth layer behind content -->
  <div id="inner-glow"></div>

  <!-- Vignette — darkens edges for cinematic depth -->
  <div id="vignette"></div>

  <!-- Film grain noise -->
  <div id="noise"></div>

  <!-- Main content -->
  <div id="content">
    <div id="label">Breaking</div>

    <!--
      Headline wrapper has overflow:hidden so the slide-up reveal
      is clipped at the container boundary (no text visible below).
    -->
    <div id="headline-wrap">
      <div id="headline">LOADING</div>
    </div>

    <div id="divider"></div>
    <div id="subhead"></div>
  </div>

  <!-- Scene counter badge -->
  <div id="badge">01</div>

  <!-- Progress bar (spans full scene duration) -->
  <div id="progress-bar"></div>

  <!-- Inject scene props, then signal SCENE_READY -->
  <script src="scene.js"></script>

</body>
</html>
