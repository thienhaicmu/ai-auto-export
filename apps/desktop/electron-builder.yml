appId: app.ai-keyword-video-factory
productName: AI Keyword Video Factory
copyright: Copyright © 2026

directories:
  buildResources: build
  output: release/${version}

files:
  - out/**/*
  - package.json

# Extra resources bundled into the installer and unpacked at:
#   Windows: %ProgramFiles%\AI Keyword Video Factory\resources\
#
# Directory structure inside resources/:
#   backend/sidecar/         PyInstaller --onedir output (sidecar.exe + DLLs)
#   ffmpeg/                  ffmpeg.exe + ffprobe.exe
#   chromium/                Playwright Chromium (chromium-XXXX/chrome-win64/...)
#   assets/                  Music, fonts, and other shared assets
extraResources:
  - from: ../../backend/dist/sidecar
    to: backend/sidecar
    filter:
      - "**/*"
  - from: ../../build/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"
  - from: ../../build/chromium
    to: chromium
    filter:
      - "**/*"
  - from: ../../assets
    to: assets
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
  # Icon must be a 256×256 .ico file at build/icon.ico
  # icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: AI Video Factory

# macOS / Linux targets left intentionally out of scope for Phase 4C.
# Uncomment and configure when those platforms are targeted.
# mac:
#   target: dmg
#   category: public.app-category.video
# linux:
#   target: AppImage
#   category: AudioVideo
